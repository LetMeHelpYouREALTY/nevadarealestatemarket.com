# Cloudflare Workers Configuration
# Learn more: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "nevadarealestatemarket-com"
main = "workers/_worker.ts"
compatibility_date = "2026-02-13"
compatibility_flags = ["nodejs_compat"]

# Account details
account_id = ""  # Add your Cloudflare account ID
workers_dev = true

# Build configuration
[build]
command = "npm run build"

# Environment variables
[vars]
DEBUG = "false"

# KV Namespaces for caching (optional)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# Analytics Engine (optional - requires Workers Paid plan)
# [[analytics_engine_datasets]]
# binding = "ANALYTICS_DATASET"

# Durable Objects (optional - for advanced caching)
# [[durable_objects.bindings]]
# name = "CACHE_OBJECT"
# class_name = "CacheObject"
# script_name = "nevadarealestatemarket-com"

# Routes - apply workers to specific paths
[[routes]]
pattern = "nevadarealestatemarket.com/*"
zone_name = "nevadarealestatemarket.com"

[[routes]]
pattern = "www.nevadarealestatemarket.com/*"
zone_name = "nevadarealestatemarket.com"

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Production environment
[env.production]
name = "nevadarealestatemarket-com-production"
vars = { DEBUG = "false" }
routes = [
  { pattern = "nevadarealestatemarket.com/*", zone_name = "nevadarealestatemarket.com" },
  { pattern = "www.nevadarealestatemarket.com/*", zone_name = "nevadarealestatemarket.com" }
]

# Staging environment
[env.staging]
name = "nevadarealestatemarket-com-staging"
vars = { DEBUG = "true" }
routes = [
  { pattern = "staging.nevadarealestatemarket.com/*", zone_name = "nevadarealestatemarket.com" }
]

# Observability
[observability]
enabled = true
head_sampling_rate = 1

# Limits
[limits]
cpu_ms = 50
